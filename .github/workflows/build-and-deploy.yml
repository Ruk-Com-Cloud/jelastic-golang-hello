name: GitHub Action Runner Build

on:
  push:
    branches: [ main, http-only ]
permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        env:
          IMAGE_NAME: ${{ vars.HARBOR_REGISTRY}}/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}
        run: |
          # Pull cache image if it exists
          docker pull $IMAGE_NAME:cache || true

          # Build with cache from previous image
          docker build \
          --cache-from $IMAGE_NAME:cache \
          -t $IMAGE_NAME:latest \
          -t $IMAGE_NAME:cache \
          .

      - name: Push Docker images
        env:
          IMAGE_NAME: ${{ vars.HARBOR_REGISTRY}}/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:cache

      - name: List docker images
        run: |
          docker images --all
