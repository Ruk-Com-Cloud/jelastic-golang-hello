name: GitHub Action Runner Build

on:
  push:
    branches: [ main, http-only ]
permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Harbor variables
        run: |
          echo "HARBOR_REGISTRY=${HARBOR_REGISTRY}"
          echo "HARBOR_USERNAME=${HARBOR_USERNAME}"
          echo "HARBOR_USERNAME length: ${#HARBOR_USERNAME}"
          echo "HARBOR_PASSWORD length: ${#HARBOR_PASSWORD}"

          # Show environment details
          echo "GitHub Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
        env:
          HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          file: docker/github-runner-image/Dockerfile
          tags: ${{ vars.HARBOR_REGISTRY}}/${{ vars.HARBOR_PROJECT }}/jelastic-golang-hello:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ vars.HARBOR_REGISTRY}}/${{ vars.HARBOR_PROJECT }}/jelastic-golang-hello:buildcache
          cache-to: type=registry,ref=${{ vars.HARBOR_REGISTRY}}/${{ vars.HARBOR_PROJECT }}/jelastic-golang-hello:buildcache,mode=max,ignore-error=true,image-manifest=true,oci-mediatypes=true

      - name: List docker images
        run: |
          docker images --all
